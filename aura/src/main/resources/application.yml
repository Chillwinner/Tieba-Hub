server:
  port: 8080

spring:
  application:
    name: aura-server
  datasource:
    url: jdbc:postgresql://localhost:5432/aura
    username: root
    password: 123456
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: aura-secret-key-2024-news-platform
  expiration: 86400000
